services:
  - type: web
    name: v51-mastering-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn src.server:app
    envVars:
      - key: ENABLE_TOKEN_CHECK
        value: true
      - key: DEFAULT_PRESET
        value: studio
      - key: DEFAULT_TARGET_LUFS
        value: -8
      - key: DEFAULT_CEILING_DB
        value: -0.9
      - key: DEFAULT_OUTPUT_FORMAT
        value: mp3
      - key: DEFAULT_WIDEN
        value: 1.05
      - key: DEFAULT_SATURATION
        value: soft
      - key: MAX_FILE_SIZE_BYTES
        value: 262144000
      - key: MASTERING_BACKEND_TOKEN
        sync: false
